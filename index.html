  function setCookie(cname,cvalue,exdays, caccount) {
  const d = new Date();
  d.setTime(d.getTime() + (exdays*24*60*60*1000));

function getCookie(cname, caccount) {
  let name = cname + "=";
  let decodedCookie = decodeURIComponent(document.cookie);
  let ca = decodedCookie.split(';');
  for(let i = 0; i < ca.length; i++) {
    let c = ca[i];
    while (c.charAt(0) == ' ') {
      c = c.substring(1);
    }
    if (c.indexOf(name) == 0) {
      return c.substring(name.length, account.length, c.length);
    }
  }
  return "";
}

function checkCookie() {
  let user = getCookie("username");

}
