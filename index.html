<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <script>
 function setCookie(cnumber, cvalue, exdays) {
  const d = new Date();
  d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));
  let expires = "expires="+d.toUTCString();
  document.cookie = cnumber + "=" + cvalue + ";" + expires + ";path=/";
}

function getCookie(cnumber) {
  let name = cnumber + "=";
  let ca = document.cookie.split(';');
  for(let i = 0; i < ca.length; i++) {
    let c = ca[i];
    while (c.charAt(0) == ' ') {
      c = c.substring(1);
    }
    if (c.indexOf(name) == 0) {
      return c.substring(name.length, c.length);
    }
  }
  return "";
}

function checkCookie() {
  let number = getCookie("LuckyNum");
  if (number != "") {
    alert("Lucky number " + number);
  } else {
    number = prompt("What is your lucky number? ", "");
    if (number != "" && number != null) {
      setCookie("LuckyNum", number, 365);
    }
  }
}
    </script>
    </head>
    <body onload="checkCookie()">
        <h1><strong>Cookie Webiste</strong></h1>
        <p>Welcome</p>
    </body>

</html>
